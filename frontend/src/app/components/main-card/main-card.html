<div class="w-full bg-white rounded-3xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
  
  <div class="flex border-b border-slate-100">
    <button (click)="switchTab('register')"
      [ngClass]="activeTab === 'register' ? 'text-slate-900 bg-slate-50/50' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'"
      class="flex-1 py-6 text-sm font-semibold tracking-wide uppercase transition-colors relative">
      <div class="flex items-center justify-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/></svg>
        <span>Registrar Documento</span>
      </div>
      <div *ngIf="activeTab === 'register'" class="absolute bottom-0 left-0 right-0 h-1 bg-emerald-500 animate-in fade-in slide-in-from-bottom-1"></div>
    </button>
    
    <button (click)="switchTab('verify')"
      [ngClass]="activeTab === 'verify' ? 'text-slate-900 bg-slate-50/50' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'"
      class="flex-1 py-6 text-sm font-semibold tracking-wide uppercase transition-colors relative">
      <div class="flex items-center justify-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Verificar Autenticidade</span>
      </div>
      <div *ngIf="activeTab === 'verify'" class="absolute bottom-0 left-0 right-0 h-1 bg-emerald-500 animate-in fade-in slide-in-from-bottom-1"></div>
    </button>
  </div>

  <div class="p-8 md:p-12 space-y-8">
    
    <app-dropzone class="block w-full" [selectedFile]="file" (fileAccepted)="handleFileAccepted($event)"></app-dropzone>

    <div class="flex flex-col items-center space-y-6">
      
      <button (click)="handleAction()" [disabled]="isProcessing || !file"
        [ngClass]="isProcessing || !file ? 'bg-slate-300 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-slate-900 to-slate-800 hover:from-slate-800 hover:to-slate-700 hover:shadow-xl shadow-slate-900/20 active:scale-95'"
        class="w-full md:w-auto px-8 py-4 rounded-xl font-bold text-white shadow-lg transition-all flex items-center justify-center space-x-3 min-w-[300px]">
        
        <ng-container *ngIf="isProcessing">
          <svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <span>Processando na Blockchain...</span>
        </ng-container>

        <ng-container *ngIf="!isProcessing">
          <svg *ngIf="activeTab === 'register'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1.2 7 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/></svg>
          <svg *ngIf="activeTab === 'verify'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          
          <span>{{ activeTab === 'register' ? 'Gerar Hash e Registrar' : 'Verificar Integridade' }}</span>
        </ng-container>
      </button>

      <div *ngIf="result" class="w-full bg-slate-50 rounded-xl p-6 border border-slate-200 overflow-hidden animate-in slide-in-from-top-4 fade-in duration-1000">
        <div class="flex items-start space-x-4">
          <div class="p-2 bg-emerald-100 rounded-lg text-emerald-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1.2 7 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <div class="flex-1 space-y-2 overflow-hidden">
            <h3 class="font-semibold text-slate-900">
              {{ activeTab === 'register' ? 'Registro Concluído' : 'Verificação Bem-sucedida' }}
            </h3>
            <div class="space-y-1">
              <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Hash do Documento (SHA-256)</p>
              <p class="font-mono text-xs text-slate-600 break-all bg-white p-2 rounded border border-slate-200 select-all">
                {{ result.hash }}
              </p>
            </div>
            <div class="pt-2 flex items-center space-x-2 text-xs text-slate-400">
              <span>Carimbo de tempo: {{ result.timestamp | date:'dd/MM/yyyy, HH:mm' }}</span>
              <span>•</span>
              <span class="flex items-center space-x-1 text-emerald-600 font-medium">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                <span>Confirmado na Rede</span>
              </span>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</div>
