<div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
  
  <h1>Validador de Documentos 🔗</h1>
  <p>Sistema de Registro Imutável via Blockchain</p>

  <hr style="width: 50%; margin: 20px auto;">

  <button 
    (click)="connect()" 
    style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #f6851b; color: white; border: none; border-radius: 5px;">
    🦊 Conectar Carteira
  </button>

  <br><br>

  <h3 *ngIf="userAddress">Sua Carteira: <span style="color: green;">{{ userAddress }}</span></h3>

  <div *ngIf="userAddress" style="margin-top: 30px; padding: 20px; border: 1px solid #ccc; display: inline-block; border-radius: 8px;">
    <h3>Registrar Novo Documento</h3>
    <input 
      #hashInput
      type="text" 
      placeholder="Cole o Hash do PDF aqui..." 
      style="padding: 10px; width: 300px; font-size: 16px; margin-right: 10px;">
    
    <button 
      (click)="register(hashInput.value)"
      style="padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #2c3e50; color: white; border: none; border-radius: 5px;">
      💾 Salvar na Blockchain
    </button>
  </div>

</div>
