<div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
  
  <h1>Bem-vindo ao VerificaChain 🔗</h1>
  <p>Sistema de Validação de Diplomas via Blockchain</p>

  <hr style="width: 50%; margin: 20px auto;">

  <button 
    (click)="connect()" 
    style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #f6851b; color: white; border: none; border-radius: 5px;">
    🦊 Conectar Carteira
  </button>

  <br><br>

  <button
    (click)="checkBalance()"
    style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #2c3e50; color: white; border: none; border-radius: 5px;">
    💰 Ver Saldo do Contrato (Teste)
  </button>

  <h3 *ngIf="userAddress">Sua Carteira: <span style="color: green;">{{ userAddress }}</span></h3>
  <p *ngIf="contractBalance">
    O contrato tem: <strong>{{ contractBalance }} ETH</strong>
  </p>

  <router-outlet></router-outlet>

</div>
